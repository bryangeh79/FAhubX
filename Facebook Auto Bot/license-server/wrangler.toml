name = "fahubx-license"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Route to custom subdomain
routes = [
  { pattern = "license.starbright-solutions.com/*", zone_name = "starbright-solutions.com" }
]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "fahubx-license-db"
database_id = "4e794335-0db3-47a2-9a48-f7521ec22ecc"

# Environment variables (set via `wrangler secret put ADMIN_API_KEY`)
# ADMIN_API_KEY = "your-secret-admin-key" — DO NOT put here, use wrangler secret
