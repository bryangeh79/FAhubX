name: E2E Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'e2e-tests/**'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'e2e-tests/**'

# 允许并发运行，但取消同一分支的旧运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    services:
      postgres:
        image: postgres:13-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: facebook_bot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:6-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            e2e-tests/package-lock.json
      
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e-tests/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      
      - name: Install backend dependencies
        run: |
          cd backend
          npm ci --ignore-scripts
        env:
          NODE_ENV: development
      
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci --ignore-scripts
        env:
          NODE_ENV: development
      
      - name: Install e2e test dependencies
        run: |
          cd e2e-tests
          npm ci --ignore-scripts
        env:
          NODE_ENV: development
      
      - name: Install Playwright browsers
        run: |
          cd e2e-tests
          npx playwright install --with-deps ${{ matrix.browser }}
        if: steps.playwright-cache.outputs.cache-hit != 'true'
      
      - name: Build backend
        run: |
          cd backend
          npm run build
        env:
          NODE_ENV: production
      
      - name: Build frontend
        run: |
          cd frontend
          npm run build
        env:
          NODE_ENV: production
      
      - name: Setup test database
        run: |
          cd backend
          npm run db:create
          npm run db:migrate
          npm run db:seed
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/facebook_bot_test
      
      - name: Run E2E tests
        run: |
          cd e2e-tests
          npm run test:e2e -- --project=${{ matrix.browser }}
        env:
          NODE_ENV: test
          BACKEND_URL: http://localhost:3001
          FRONTEND_URL: http://localhost:5173
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: facebook_bot_test
          DATABASE_USERNAME: test_user
          DATABASE_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_DB: 1
          PLAYWRIGHT_TEST_TIMEOUT: 30000
          PLAYWRIGHT_EXPECT_TIMEOUT: 5000
      
      - name: Generate Allure report
        if: always()
        run: |
          cd e2e-tests
          npm run report:generate
      
      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.browser }}
          path: |
            e2e-tests/reports/test-results/
            e2e-tests/reports/playwright-html/
            e2e-tests/reports/playwright-results.json
            e2e-tests/reports/junit-results.xml
          retention-days: 7
      
      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.browser }}
          path: e2e-tests/reports/allure-report/
          retention-days: 7
      
      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-${{ matrix.browser }}
          path: e2e-tests/reports/screenshots/
          retention-days: 7
      
      - name: Upload test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos-${{ matrix.browser }}
          path: e2e-tests/reports/videos/
          retention-days: 7
      
      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-traces-${{ matrix.browser }}
          path: e2e-tests/reports/traces/
          retention-days: 7
  
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-results-*
          path: test-results
          merge-multiple: true
      
      - name: Generate test summary
        run: |
          # 解析测试结果并生成摘要
          node ci-cd-integration/scripts/generate-test-summary.js
      
      - name: Create test summary comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('test-summary.md', 'utf8');
            
            // 查找现有的测试总结评论
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const testComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('## E2E测试结果')
            );
            
            if (testComment) {
              // 更新现有评论
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: testComment.id,
                body: summary,
              });
            } else {
              // 创建新评论
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summary,
              });
            }
      
      - name: Send Slack notification
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#ci-cd-notifications'
          username: 'GitHub Actions Bot'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Upload test summary
        uses: actions/upload-artifact@v4
        with:
          name: test-summary
          path: |
            test-summary.md
            test-results-summary.json
          retention-days: 30
  
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
      
      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:5173'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
      
      - name: Upload security scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            snyk-report.html
            zap-report.html
          retention-days: 90
  
  performance-test:
    name: Performance Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup k6
        uses: grafana/setup-k6@v2
      
      - name: Run performance tests
        run: |
          cd e2e-tests
          npm run test:performance
      
      - name: Upload performance test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-test-results
          path: e2e-tests/reports/performance/
          retention-days: 30