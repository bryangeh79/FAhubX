# Facebook Auto Bot 生产环境部署流水线
name: Deploy to Production

on:
  push:
    tags:
      - 'v*'  # 仅当推送版本标签时触发
  workflow_dispatch:  # 允许手动触发
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
      version:
        description: '部署版本'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 代码质量检查
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run backend tests
        run: npm test
        working-directory: ./backend
        env:
          NODE_ENV: test

      - name: Run backend linting
        run: npm run lint
        working-directory: ./backend

      - name: Run frontend linting
        run: npm run lint
        working-directory: ./frontend

      - name: Run TypeScript compilation check
        run: npm run build
        working-directory: ./backend

      - name: Security audit
        run: npm audit --audit-level=high
        working-directory: ./backend

  # 构建 Docker 镜像
  build-and-push:
    needs: quality-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./docker/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}-backend
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./docker/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}-frontend
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 部署到生产环境
  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Copy deployment files
        run: |
          rsync -avz --exclude='.git' --exclude='node_modules' \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/fbautobot/

      - name: Deploy application
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd /opt/fbautobot
            
            # 加载环境变量
            source .env.production
            
            # 拉取最新镜像
            docker-compose -f docker-compose.prod.yml pull
            
            # 运行数据库迁移
            docker-compose -f docker-compose.prod.yml run --rm backend npm run migration:run
            
            # 重启服务
            docker-compose -f docker-compose.prod.yml up -d
            
            # 等待服务就绪
            sleep 30
            
            # 运行健康检查
            ./deployment-scripts/health-check.sh quick
          EOF

      - name: Send deployment notification
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: deployments
          SLACK_TITLE: "✅ 生产环境部署成功"
          SLACK_MESSAGE: "Facebook Auto Bot v${{ github.ref_name }} 已成功部署到生产环境"

      - name: Send deployment failure notification
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: deployments
          SLACK_TITLE: "❌ 生产环境部署失败"
          SLACK_MESSAGE: "Facebook Auto Bot v${{ github.ref_name }} 部署失败，请检查日志"

  # 运行集成测试
  integration-test:
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment
        run: sleep 60

      - name: Run API tests
        run: |
          curl -f https://api.yourdomain.com/health || exit 1
          curl -f https://api.yourdomain.com/api/status || exit 1

      - name: Run frontend tests
        run: |
          curl -f https://yourdomain.com || exit 1

      - name: Check monitoring
        run: |
          curl -f http://${{ secrets.SERVER_HOST }}:3001/api/health || exit 1
          curl -f http://${{ secrets.SERVER_HOST }}:9090/-/healthy || exit 1