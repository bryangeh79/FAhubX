# FAhubX Redis Configuration (Local Mode)
# This file is used by the bundled Redis for Windows

# Network - local only, no external access
bind 127.0.0.1
protected-mode yes

# Port is overridden by command line --port flag
port 6380

# Connections
timeout 0
tcp-keepalive 300

# Do NOT run as daemon (managed by start.bat)
daemonize no

# Logging
loglevel notice

# Database
databases 1

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence - disabled (BullMQ jobs are transient)
save ""
appendonly no

# Performance
hz 10
