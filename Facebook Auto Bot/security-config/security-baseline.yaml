# Facebook Auto Bot 安全配置基线
# 版本: 1.0
# 日期: 2026-04-13

version: "1.0"
name: "facebook-auto-bot-security-baseline"
description: "Facebook Auto Bot SaaS平台安全配置基线"

# 1. 认证和授权安全
authentication:
  password_policy:
    min_length: 8
    require_uppercase: true
    require_lowercase: true
    require_numbers: true
    require_symbols: true
    max_age_days: 90
    history_size: 5
  
  session_management:
    timeout_minutes: 30
    renewal_enabled: true
    concurrent_sessions: 3
    
  jwt_config:
    algorithm: "HS256"
    access_token_expiry: "15m"
    refresh_token_expiry: "7d"
    issuer: "fbautobot.com"
    audience: "fbautobot-client"

# 2. 输入验证安全
input_validation:
  sql_injection:
    enabled: true
    method: "parameterized_queries"
    log_attempts: true
    
  xss_protection:
    enabled: true
    content_security_policy: true
    output_encoding: true
    
  csrf_protection:
    enabled: true
    cookie_secure: true
    cookie_http_only: true
    cookie_same_site: "strict"

# 3. 数据安全
data_security:
  encryption:
    at_rest: true
    in_transit: true
    algorithm: "AES-256-GCM"
    
  sensitive_data:
    masking_enabled: true
    logging_restricted: true
    storage_encrypted: true
    
  backup:
    enabled: true
    frequency: "daily"
    retention_days: 30
    encryption: true

# 4. API安全
api_security:
  authentication:
    required: true
    methods: ["jwt", "api_key"]
    
  rate_limiting:
    enabled: true
    window_ms: 900000  # 15分钟
    max_requests: 100
    by_ip: true
    
  validation:
    request_validation: true
    response_validation: true
    schema_validation: true

# 5. 网络安全
network_security:
  cors:
    enabled: true
    allowed_origins:
      - "http://localhost:8080"
      - "https://fbautobot.com"
      - "https://app.fbautobot.com"
    credentials: true
    max_age: 86400
    
  headers:
    x_frame_options: "DENY"
    x_content_type_options: "nosniff"
    x_xss_protection: "1; mode=block"
    strict_transport_security: "max-age=31536000; includeSubDomains"
    content_security_policy: "default-src 'self'"
    referrer_policy: "strict-origin-when-cross-origin"

# 6. 日志和监控
logging_monitoring:
  security_logs:
    enabled: true
    level: "warn"
    retention_days: 90
    encryption: true
    
  audit_logs:
    enabled: true
    events:
      - "login"
      - "logout"
      - "password_change"
      - "permission_change"
      - "data_access"
    
  monitoring:
    enabled: true
    metrics:
      - "failed_logins"
      - "rate_limit_hits"
      - "security_events"
      - "api_errors"
    alerts:
      - "multiple_failed_logins"
      - "suspicious_activity"
      - "security_violation"

# 7. 依赖管理
dependency_management:
  scanning:
    enabled: true
    frequency: "weekly"
    tools:
      - "npm_audit"
      - "snyk"
    
  updates:
    automatic: false
    review_required: true
    critical_fix_days: 7
    high_fix_days: 30
    
  whitelist:
    enabled: true
    review_frequency: "monthly"

# 8. 容器安全
container_security:
  image_security:
    scanning: true
    signed: true
    trusted_registry: true
    
  runtime_security:
    non_root_user: true
    read_only_root: true
    resource_limits: true
    security_context: true
    
  network_security:
    network_policy: true
    port_exposure: "minimal"
    service_mesh: false

# 9. 合规要求
compliance:
  standards:
    - name: "OWASP Top 10"
      version: "2021"
      enabled: true
      
    - name: "GDPR"
      enabled: true
      requirements:
        - "data_protection"
        - "user_consent"
        - "data_portability"
        - "right_to_be_forgotten"
        
    - name: "ISO 27001"
      enabled: false
      planned: true

# 10. 应急响应
incident_response:
  detection:
    enabled: true
    automated: true
    manual_review: true
    
  response:
    playbooks: true
    escalation: true
    communication: true
    
  recovery:
    backup_restore: true
    forensic_analysis: true
    improvement_plan: true

# 11. 安全培训
security_training:
  developers:
    frequency: "quarterly"
    topics:
      - "secure_coding"
      - "owasp_top_10"
      - "dependency_management"
      
  operations:
    frequency: "biannually"
    topics:
      - "incident_response"
      - "security_monitoring"
      - "compliance"
      
  all_staff:
    frequency: "annually"
    topics:
      - "security_awareness"
      - "phishing_prevention"
      - "data_protection"

# 12. 验证和测试
validation_testing:
  automated_tests:
    security_unit_tests: true
    integration_tests: true
    e2e_security_tests: true
    
  manual_testing:
    penetration_testing: "quarterly"
    code_review: "all_changes"
    architecture_review: "major_changes"
    
  tools:
    static_analysis: true
    dynamic_analysis: true
    dependency_scanning: true

# 基线验证
validation:
  frequency: "monthly"
  automated: true
  manual_review: true
  reporting: true
  remediation_days: 14

# 例外处理
exceptions:
  request_process: true
  approval_required: true
  time_bound: true
  documentation_required: true

# 文档和版本
documentation:
  security_policies: true
  procedures: true
  incident_reports: true
  version_control: true

metadata:
  created: "2026-04-13"
  last_updated: "2026-04-13"
  owner: "security-team@fbautobot.com"
  review_frequency: "quarterly"